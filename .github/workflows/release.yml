name: release

# Build the `tfls` server for each platform, attach the archives to the GitHub
# Release, then package the VS Code extension VSIX. Driven by release-please:
# merging the release PR pushes a `v*` tag and release-please.yml dispatches this
# workflow with that tag (a `v*` push made with GITHUB_TOKEN does not itself
# trigger workflows, hence the explicit dispatch). A direct `v*` tag push or a
# manual dispatch also work.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and attach artifacts to (e.g. v0.2.3)
        required: true
        type: string
      sha:
        description: Commit SHA to build (release-please passes this; the draft tag may not exist yet)
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: tfls
          # macOS arm64 is DISABLED until a self-hosted Apple-silicon runner is
          # available again (GitHub-hosted macOS runners are billed at a steep
          # multiplier). With no runner the job sits queued forever and blocks
          # the VSIX job (needs: build). Re-enable by uncommenting:
          # - os: [self-hosted, macOS, ARM64]
          #   target: aarch64-apple-darwin
          #   bin: tfls
          # Windows: the provider-plugin transport uses TCP on Windows (unix
          # sockets are cfg-gated to unix), so the server now builds here.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: tfls.exe
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.sha || inputs.tag || github.ref }}

      # tonic-build (crates/tfls-provider-protocol/build.rs) needs protoc
      # to compile the tfplugin5/6 protos.
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        # No --locked: release-please (simple) bumps the version in Cargo.toml
        # but not the workspace-member entries in Cargo.lock, so on a release
        # tag the lock is briefly stale. Letting cargo reconcile updates only
        # those path-crate versions offline; registry deps stay pinned by the
        # committed lock.
        run: cargo build --release -p tfls-cli --bin tfls --target ${{ matrix.target }}

      - name: Package
        shell: bash
        env:
          VERSION: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          staging="tfls-${VERSION}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$staging/"
          cp README.md LICENSE* "$staging/" 2>/dev/null || true
          tar czf "$staging.tar.gz" "$staging"
          # Checksum sidecar (the VS Code extension verifies this on download).
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$staging.tar.gz" > "$staging.tar.gz.sha256"
          else
            shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"
          fi
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      # Upload to the DRAFT release (created by release-please) with the gh CLI:
      # `gh release upload` resolves draft releases by tag, whereas the
      # get-release-by-tag API softprops uses skips drafts. Assets can only be
      # added while the release is a draft (immutable once published) — the
      # final `publish` job flips it to published.
      - name: Upload to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" "$ASSET" "$ASSET.sha256" --clobber --repo "$GITHUB_REPOSITORY"

  # Package the VS Code extension and attach the VSIX to the release so it can
  # be installed and tested. Publishing to the Marketplace / Open VSX is NOT
  # done here — it's a deliberate, manual step (see vscode-publish.yml) until the
  # extension is polished. A single universal VSIX (no bundled binary).
  vscode:
    name: package vscode extension
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.sha || inputs.tag || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - run: npm ci

      - name: Type-check & lint
        run: |
          npm run check
          npm run lint

      - name: Package VSIX
        env:
          VERSION: ${{ inputs.tag || github.ref_name }}
        run: npx @vscode/vsce package --out "tfls-vscode-${VERSION}.vsix"

      - name: Upload VSIX to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.tag || github.ref_name }}
        run: gh release upload "$VERSION" "tfls-vscode-${VERSION}.vsix" --clobber --repo "$GITHUB_REPOSITORY"

  # Publish the draft release once all assets are attached. Publishing makes the
  # release (now immutable) visible with its binaries + VSIX; doing it last means
  # we never try to add assets to an already-published immutable release.
  publish:
    name: publish release
    needs: [build, vscode]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release edit "$TAG" --draft=false --latest --repo "$GITHUB_REPOSITORY"
