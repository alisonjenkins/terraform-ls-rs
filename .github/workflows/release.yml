name: release

# Build the `tfls` server for each platform and attach the archives to the
# GitHub Release whenever a `v*` tag is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: tfls
          # macOS is built on a self-hosted Apple-silicon runner (GitHub-hosted
          # macOS runners are billed at a steep multiplier and the free pool is
          # frequently starved). arm64 only.
          - os: [self-hosted, macOS, ARM64]
            target: aarch64-apple-darwin
            bin: tfls
          # Windows: the provider-plugin transport uses TCP on Windows (unix
          # sockets are cfg-gated to unix), so the server now builds here.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: tfls.exe
    steps:
      - uses: actions/checkout@v4

      # tonic-build (crates/tfls-provider-protocol/build.rs) needs protoc
      # to compile the tfplugin5/6 protos.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p tfls-cli --bin tfls --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          staging="tfls-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$staging/"
          cp README.md LICENSE* "$staging/" 2>/dev/null || true
          tar czf "$staging.tar.gz" "$staging"
          # Checksum sidecar (the VS Code extension verifies this on download).
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$staging.tar.gz" > "$staging.tar.gz.sha256"
          else
            shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"
          fi
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          fail_on_unmatched_files: true
