name: CI

# Build, lint, format-check and test on every push to main and every PR.
# The `Test` job always runs (so it can be a required status check without the
# path-filter deadlock — a skipped required check never reports and blocks
# merges). It only does real work when buildable code changed; otherwise it
# short-circuits to success. Cargo runs inside `nix develop` (not the hermetic
# `nix flake check`) so the cargo target dir + sccache persist across runs and
# only changed crates recompile.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
              - 'rust-toolchain.toml'
              - 'deny.toml'
              - '.github/workflows/ci.yml'

  test:
    name: Test
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no Rust changes)
        if: needs.changes.outputs.rust != 'true'
        run: echo "No buildable code changed — Test is a no-op success."

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        if: needs.changes.outputs.rust == 'true'

      - uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main
        if: needs.changes.outputs.rust == 'true'

      # Persist the nix store (toolchain, devshell deps, fetched derivations)
      # across runs. Keyed on the inputs that change the toolchain/devshell.
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        if: needs.changes.outputs.rust == 'true'
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'rust-toolchain.toml') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # Persist cargo's registry, the sccache object cache and the target dir so
      # unchanged crates are sccache hits and only changed code recompiles. A
      # fresh key per commit always saves the latest state; restore-keys fall
      # back to the most recent prior cache.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        if: needs.changes.outputs.rust == 'true'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/sccache
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            cargo-${{ runner.os }}-

      - name: Check, lint, test
        if: needs.changes.outputs.rust == 'true'
        # Drop debuginfo for CI builds (not set in the dev shell, so local
        # debugging keeps it); passed through into `nix develop`.
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: |
          nix develop --command bash -euo pipefail -c '
            cargo fmt --check
            cargo clippy --workspace --all-targets -- -D warnings
            cargo nextest run --workspace
            cargo deny check
            sccache --show-stats || true
          '

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
