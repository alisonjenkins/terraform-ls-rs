name: CI

# Build, lint, format-check and test on every push to main and every PR.
# `nix flake check` runs the build + clippy (-D warnings) + fmt --check + the
# full test suite as the crane-defined checks in flake.nix (deps are built once
# and cached). cargo deny runs separately because it fetches the advisory DB
# over the network and so isn't a sandboxed flake check.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main

      - uses: DeterminateSystems/magic-nix-cache-action@14645543c3b214bedad3b9b49775cb042f4c1fc7 # main

      - name: Flake check (build + clippy + fmt + test)
        run: nix flake check --print-build-logs

      - name: cargo deny
        run: nix develop --command cargo deny check

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
